version: '3'

networks:
  whaticket:

services:

  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    depends_on:
      - postgres
      - evolution-api
    environment:
      - DB_DIALECT=${DB_DIALECT:-postgres}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-${POSTGRES_USER:-whaticket}}
      - DB_PASS=${DB_PASS:-${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}}
      - DB_NAME=${DB_NAME:-${POSTGRES_DB:-whaticket_pg}}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      - BACKEND_URL=${BACKEND_URL:-${FRONTEND_URL:-http://localhost:3000}}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROXY_PORT=${PROXY_PORT:-80}
      - CALENDAR_TOKEN_ENCRYPTION_KEY=${CALENDAR_TOKEN_ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALENDAR_REDIRECT_URI=${GOOGLE_CALENDAR_REDIRECT_URI}
      - GOOGLE_CALENDAR_SCOPES=${GOOGLE_CALENDAR_SCOPES}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:admin@whaticket.com}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://evolution-api:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:?EVOLUTION_API_KEY must be set}
      - EVOLUTION_WEBHOOK_URL=${EVOLUTION_WEBHOOK_URL:-http://backend:3000/webhooks/evolution}
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox
      - CHROME_BIN=/usr/bin/google-chrome-stable
    expose:
      - "3000"
    volumes:
      - ./backend/public/:/usr/src/app/public/
      - ./backend/.wwebjs_auth/:/usr/src/app/.wwebjs_auth/
      # Necessario para a funcao de atualizacao pelo painel. Nao exponha o backend diretamente na internet.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - whaticket

  frontend:
    ports:
      - ${FRONTEND_PORT:-3000}:80
      - ${FRONTEND_SSL_PORT:-3001}:443
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    environment:
      - URL_BACKEND=backend:3000
      - REACT_APP_BACKEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - VITE_BACKEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - FRONTEND_SERVER_NAME=${FRONTEND_SERVER_NAME}
      - BACKEND_SERVER_NAME=${BACKEND_SERVER_NAME}
    volumes:
      - ./ssl/certs/:/etc/nginx/ssl/
      - ./ssl/www/:/var/www/letsencrypt/
    networks:
      - whaticket

  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    volumes:
      - ./.docker/pgdata/:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-whaticket_pg}
      - POSTGRES_USER=${POSTGRES_USER:-whaticket}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - TZ=${TZ:-America/Sao_Paulo}
    expose:
      - "5432"
    restart: always
    networks:
      - whaticket

  evolution-api:
    image: ${EVOLUTION_API_IMAGE:-evoapicloud/evolution-api:v2.3.7}
    restart: always
    depends_on:
      - postgres
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:?EVOLUTION_API_KEY must be set}
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://evolution-api:8080}
      - DEL_INSTANCE=false
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER:-whaticket}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${EVOLUTION_DB_NAME:-evolution_api}
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      - QRCODE_LIMIT=${EVOLUTION_QRCODE_LIMIT:-30}
      - QRCODE_COLOR=${EVOLUTION_QRCODE_COLOR:-#198754}
      - CONFIG_SESSION_PHONE_VERSION=${EVOLUTION_WEB_VERSION:-2,3000,1042119269}
      - WEB_VERSION=${EVOLUTION_WEB_VERSION:-2,3000,1042119269}
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - whaticket

volumes:
  evolution_instances:

