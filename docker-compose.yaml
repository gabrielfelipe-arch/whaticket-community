version: '3'

networks:
  whaticket:

services:

  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    depends_on:
      - postgres
    environment:
      - DB_DIALECT=${DB_DIALECT:-postgres}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-${POSTGRES_USER:-whaticket}}
      - DB_PASS=${DB_PASS:-${POSTGRES_PASSWORD:-strongpassword}}
      - DB_NAME=${DB_NAME:-${POSTGRES_DB:-whaticket_pg}}
      - JWT_SECRET=${JWT_SECRET:-3123123213123}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-75756756756}
      - BACKEND_URL=${BACKEND_URL:-http://localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PROXY_PORT=${PROXY_PORT:-8080}
      - CHROME_ARGS=--no-sandbox --disable-setuid-sandbox
      - CHROME_BIN=/usr/bin/google-chrome-stable
    ports:
      - ${BACKEND_PORT:-8080}:3000
    volumes:
      - ./backend/public/:/usr/src/app/public/
      - ./backend/.wwebjs_auth/:/usr/src/app/.wwebjs_auth/
    networks:
      - whaticket

  frontend:
    ports:
      - ${FRONTEND_PORT:-3000}:80
      - ${FRONTEND_SSL_PORT:-3001}:443
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    environment:
      - URL_BACKEND=backend:3000
      - REACT_APP_BACKEND_URL=http://localhost:8085/
      - FRONTEND_SERVER_NAME=${FRONTEND_SERVER_NAME}
      - BACKEND_SERVER_NAME=${BACKEND_SERVER_NAME}
    volumes:
      - ./ssl/certs/:/etc/nginx/ssl/
      - ./ssl/www/:/var/www/letsencrypt/
    networks:
      - whaticket

  postgres:
    image: postgres:${POSTGRES_VERSION:-16}
    volumes:
      - ./.docker/pgdata/:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-whaticket_pg}
      - POSTGRES_USER=${POSTGRES_USER:-whaticket}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-strongpassword}
      - TZ=${TZ:-America/Sao_Paulo}
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    restart: always
    networks:
      - whaticket

