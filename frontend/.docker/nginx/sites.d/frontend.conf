location @backend {
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
}

location @spa {
    try_files /index.html =404;
    include include.d/nocache.conf;
}

location ~ /\.(?!well-known) {
    return 404;
}

location ~ ^/(auth|users|user-profiles|public-settings|settings|contacts|contact|tickets|messages|whatsapp|whatsapp-updates|whatsapp-provider|whatsappSession|whatsappsession|queue|quickAnswers|api/messages|ticket-categories|closing-reasons|ura-flows|ura-options|ai-settings|knowledge-base|satisfaction-surveys|qualification-forms|qualification-form-questions|qualification-form-responses|qualification-form-answers|ai-ticket-contexts|ai-leads|ai-calendar-connections|ai-tool-executions|audit-logs|qualification-form-message-media|custom|campaigns|scheduled-messages|tags|reports|glpi|calendar|public|socket.io)(/|$) {
    error_page 419 = @spa;
    if ($http_accept ~* "text/html") { return 419; }
    try_files __backend__ @backend;
}

location = /users {
    error_page 419 = @spa;
    if ($http_accept ~* "text/html") { return 419; }
    try_files __backend__ @backend;
}

location = /connections {
    try_files __spa__ @spa;
}

location = /contacts {
    error_page 419 = @spa;
    if ($http_accept ~* "text/html") { return 419; }
    try_files __backend__ @backend;
}

location = /queues {
    error_page 419 = @spa;
    if ($http_accept ~* "text/html") { return 419; }
    try_files __backend__ @backend;
}

location = /settings {
    error_page 419 = @spa;
    if ($http_accept ~* "text/html") { return 419; }
    try_files __backend__ @backend;
}

location = /integrations {
    try_files __spa__ @spa;
}

location = /profiles {
    try_files __spa__ @spa;
}

location = /quickAnswers {
    try_files __spa__ @spa;
}

location = /campaigns-schedules {
    try_files __spa__ @spa;
}

location / {
    try_files $uri $uri/ /index.html;
    include include.d/nocache.conf;
}

location /static {
   alias /var/www/public/static/;
   include include.d/allcache.conf;
}

include "include.d/spa.conf";

